<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRUST Framework</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tokens.css" />
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/layout.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <link rel="stylesheet" href="/static/css/dashboard.css" />
  <link rel="stylesheet" href="/static/css/settings.css" />
  <link rel="stylesheet" href="/static/css/accent-scoping.css" />
  <link rel="stylesheet" href="/static/css/interaction-states.css" />
  <link rel="stylesheet" href="/static/css/animations.css" />
  <link rel="stylesheet" href="/static/css/print.css" />
  <noscript>
    <style>
      body { overflow: auto !important; }
    </style>
  </noscript>
</head>
<body>
  <a href="#appViewMount" class="skip-link">Skip to current app view</a>
      <a href="#questionnairePanel" class="skip-link">Skip to questionnaire</a>
      <a href="#contextPanelTitle" class="skip-link">Skip to context panel</a>
  <div class="top-accent"></div>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <img src="/static/ut-logo.png" alt="UNIVERSITY TWENTE" class="logo-dept" height="48" width="48" />
        <img src="/static/lisa-eis.svg" alt="LISA EIS" class="logo-dept" height="48" width="48" />
        <div class="brand-logos">
          <div class="trust-label">
            <img src="/static/trust.svg" alt="TRUST" class="logo-trust" height="32" width="32" />
            <p>Framework</p>
          </div>
        </div>
      </div>
      <nav class="header-bar" id="headerBar" aria-label="Application navigation">
        <div id="appHeaderNavMount" class="app-header-cluster" data-shell-mount="app-header-nav"></div>
        <div class="workspace-header-cluster" id="workspaceHeaderCluster" data-shell-mount="workspace-header">
          <p id="completionStripLabel" class="visually-hidden">Questionnaire progress strip</p>
          <ul class="completion-strip" aria-labelledby="completionStripLabel"></ul>
          <div id="workspaceStatusMount" class="workspace-status-strip" data-shell-mount="workspace-status"></div>
        </div>
        <div id="appSessionMount" class="app-header-cluster" data-shell-mount="app-session"></div>
        <div class="header-bar-toggles" id="headerBarToggles">
          <button id="sidebarToggle" class="nav-button shell-action-button" type="button" data-sidebar-toggle aria-controls="frameworkPanel" aria-expanded="true">Sidebar</button>
        </div>
      </nav>
    </div>
  </header>

  <div id="sidebarFocusReturn" class="shell-focus-anchor" tabindex="-1"></div>

  <section id="reviewShellMount" class="review-shell-stage" data-shell-mount="review-shell" hidden></section>
  <div id="reviewShellStatusLiveRegion" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
  <section id="appViewMount" class="app-view-stage" data-shell-mount="app-view" hidden></section>

  <main class="shell-layout" id="trustShell" data-shell-architecture="page-based">
    <div id="contextDrawerBackdrop" class="context-drawer-backdrop" data-sidebar-dismiss aria-hidden="true"></div>

    <section class="panel questionnaire-panel" id="questionnairePanel" aria-labelledby="questionnairePanelTitle" tabindex="-1">
      <div class="panel-progress"><div class="panel-progress-bar" id="questionnaireProgress"></div></div>
      <div class="panel-inner">
        <form aria-label="Trust Framework Questionnaire">
        <button type="submit" class="visually-hidden">Submit questionnaire</button>
        <div class="questionnaire-shell">
          <div class="questionnaire-panel-header">
            <h1 class="panel-title visually-hidden" id="questionnairePanelTitle">Questionnaire</h1>
            <div class="shell-toolbar">

            </div>
          </div>
          <p class="panel-caption" style="display:none">Navigate pages using the pager below or the sidebar index.</p>

          <div class="workspace-layout">
            <div class="page-index-column">
              <nav id="pageSidebarMount" aria-label="Canonical page index" data-shell-mount="page-sidebar"></nav>
            </div>
            <div class="questionnaire-workspace">
              <div id="pagerMount" data-shell-mount="pager"></div>
              <div id="questionnaireRenderRoot" data-shell-mount="questionnaire-pages"></div>
            </div>
          </div>
        </div>
        </form>
      </div>
    </section>

    <div class="shell-divider" role="separator"></div>

    <aside class="panel framework-panel" id="frameworkPanel" aria-labelledby="contextPanelTitle" tabindex="-1">
      <div class="panel-progress"><div class="panel-progress-bar" id="frameworkProgress"></div></div>
      <div class="panel-inner">
        <div class="panel-title-row">
          <h2 class="panel-title" id="contextPanelTitle">Context</h2>
          <button class="nav-button shell-action-button context-drawer-dismiss" type="button" data-sidebar-dismiss>Close</button>
        </div>

        <div class="sidebar-tab-bar" role="tablist" aria-label="Sidebar sections">
          <button type="button" class="sidebar-tab" role="tab" id="sidebarTabGuidance" data-sidebar-tab="guidance" aria-selected="true" aria-controls="sidebarPanelGuidance" tabindex="0">Guidance</button>
          <button type="button" class="sidebar-tab" role="tab" id="sidebarTabReference" data-sidebar-tab="reference" aria-selected="false" aria-controls="sidebarPanelReference" tabindex="-1">Reference</button>
          <button type="button" class="sidebar-tab" role="tab" id="sidebarTabAbout" data-sidebar-tab="about" aria-selected="false" aria-controls="sidebarPanelAbout" tabindex="-1">About</button>
          <div class="sidebar-tab-indicator" aria-hidden="true"></div>
        </div>

        <div class="sidebar-tab-panels">
          <div class="sidebar-tab-panel" role="tabpanel" id="sidebarPanelGuidance" data-sidebar-panel="guidance" aria-labelledby="sidebarTabGuidance">
            <div id="contextSidebarMount" data-shell-mount="context-sidebar"></div>

            <details class="reference-drawer sidebar-help-drawer" data-drawer-id="help-legend">
              <summary class="reference-drawer-summary">
                <span class="reference-drawer-summary-main">
                  <span class="reference-drawer-code">HELP</span>
                  <span class="reference-drawer-title">Interaction legend &amp; shortcuts</span>
                </span>
              </summary>
              <div class="reference-drawer-panel" id="helpLegendMount" data-shell-mount="help-legend"></div>
            </details>
          </div>

          <div class="sidebar-tab-panel" role="tabpanel" id="sidebarPanelReference" data-sidebar-panel="reference" aria-labelledby="sidebarTabReference" hidden>
            <section id="referenceDrawerMount" data-shell-mount="reference-drawers" aria-label="Reference drawers"></section>
          </div>

          <div class="sidebar-tab-panel" role="tabpanel" id="sidebarPanelAbout" data-sidebar-panel="about" aria-labelledby="sidebarTabAbout" hidden>
            <div id="aboutPanelMount" data-shell-mount="about-panel"></div>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
